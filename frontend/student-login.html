<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - AptioGen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .login-container {
            max-width: 480px;
            margin: 60px auto;
        }

        .login-card {
            padding: 40px;
        }

        .btn-signin {
            display: block;
            margin: 24px auto 0;
            min-width: 160px;
        }
    </style>
</head>

<body>
    <header class="appbar">
        <h2>AptioGen</h2>
        <div class="right-icons">
            <i class="fa-solid fa-moon theme-toggle"></i>
            <a href="index.html"><i class="fa-solid fa-house"></i></a>
        </div>
    </header>

    <div class="container login-container">
        <div class="card login-card">
            <div class="text-center mb-4">
                <div class="avatar-circle">
                    <i class="fa-solid fa-user-graduate"></i>
                </div>
                <h2>Student Portal</h2>
                <p>Access your quizzes and track your progress</p>
            </div>

            <!-- Independent Student Form -->
            <div id="indpLoginView">
                <form id="studentIndpLoginForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="indpEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="indpPassword" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-signin">Sign In</button>
                    <p class="text-center mt-3">
                        New here? <a href="student-registration-choice.html">Create a student account</a>
                    </p>
                </form>
                <div class="social-login text-center mt-4">
                    <p class="small text-secondary">Or login with social accounts</p>
                    <div class="flex justify-center gap-3 mt-2">
                        <button class="social-btn" onclick="socialLogin('google')"><i
                                class="fab fa-google"></i></button>
                        <button class="social-btn" onclick="socialLogin('github')"><i
                                class="fab fa-github"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initTheme } from './js/theme.js';
        import { auth } from './js/firebase.js';
        import {
            signInWithEmailAndPassword,
            GoogleAuthProvider,
            GithubAuthProvider,
            signInWithPopup
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        import { BASE_URL } from './js/config.js';

        initTheme();

        const API_BASE = `${BASE_URL}/api`;

        async function handleBackendLogin(user, additionalData = {}) {
            const idToken = await user.getIdToken();
            const response = await fetch(`${API_BASE}/students/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${idToken}`
                },
                body: JSON.stringify(additionalData),
                credentials: 'include'
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('token', idToken); // Store token for consistent auth
                sessionStorage.setItem('studentInfo', JSON.stringify(data.user));
                window.location.href = 'explore.html';
            } else {
                const err = await response.json();
                alert(err.error || 'Login failed');
            }
        }

        // Independent Login
        document.getElementById('studentIndpLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('indpEmail').value.trim();
            const password = document.getElementById('indpPassword').value;

            try {
                // 1. Try New Direct JWT Login first
                const jwtRes = await fetch(`${API_BASE}/auth/student/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                    credentials: 'include'
                });

                if (jwtRes.ok) {
                    const data = await jwtRes.json();
                    localStorage.setItem('token', data.token);
                    sessionStorage.setItem('studentInfo', JSON.stringify(data.user));
                    window.location.href = 'explore.html';
                    return;
                }

                // 2. Fallback to Legacy Firebase Login
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                await handleBackendLogin(userCredential.user);
            } catch (error) {
                alert('Login failed: ' + error.message);
            }
        });

        // Social Login
        window.socialLogin = async (providerName) => {
            let provider;
            if (providerName === 'google') provider = new GoogleAuthProvider();
            else if (providerName === 'github') provider = new GithubAuthProvider();

            try {
                const userCredential = await signInWithPopup(auth, provider);
                await handleBackendLogin(userCredential.user, {
                    name: userCredential.user.displayName,
                    email: userCredential.user.email
                });
            } catch (error) {
                alert(`${providerName} login failed: ${error.message}`);
            }
        };
    </script>
</body>

</html>
